name: Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    name: Build and publish ${{ matrix.artifact }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: archgate-darwin-arm64
            os: macos-latest
          - target: bun-linux-x64
            artifact: archgate-linux-x64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - run: bun install --frozen-lockfile

      - run: bun run validate

      - name: Build binary
        run: |
          bun build src/cli.ts \
            --compile \
            --bytecode \
            --minify \
            --target ${{ matrix.target }} \
            --outfile dist/${{ matrix.artifact }}

      - name: Copy binary into npm package
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="${TAG#v}"
          cp dist/${{ matrix.artifact }} packages/${{ matrix.artifact }}/bin/archgate
          chmod +x packages/${{ matrix.artifact }}/bin/archgate
          cd packages/${{ matrix.artifact }}
          npm version "$VERSION" --no-git-tag-version

      - uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Publish platform package
        run: npm publish packages/${{ matrix.artifact }} --access public
