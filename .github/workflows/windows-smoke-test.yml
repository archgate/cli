name: Windows Smoke Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Windows Smoke Test
    runs-on: windows-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Format check
        run: bun run format:check

      - name: Tests
        run: bun test --timeout 60000

      - name: Build Windows binary
        run: bun build src/cli.ts --compile --bytecode --outfile dist/archgate-smoke-test

      - name: Smoke test binary
        shell: pwsh
        run: |
          $binary = "dist/archgate-smoke-test.exe"
          if (-not (Test-Path $binary)) {
            Write-Error "Binary not found at $binary"
            exit 1
          }
          $output = & $binary --version 2>&1
          Write-Host "archgate version: $output"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Binary exited with code $LASTEXITCODE"
            exit 1
          }

      - name: Build old-version binary for upgrade test
        shell: pwsh
        run: |
          # Save original version and set a fake old one
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $originalVersion = $pkg.version
          $pkg.version = "0.0.1"
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          bun build src/cli.ts --compile --bytecode --outfile dist/archgate-upgrade-test
          # Restore original version
          $pkg.version = $originalVersion
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json

      - name: Smoke test upgrade (binary self-replacement)
        shell: pwsh
        run: |
          # Place the old binary in ~/.archgate/bin/
          $binDir = "$HOME\.archgate\bin"
          New-Item -ItemType Directory -Path $binDir -Force | Out-Null
          Copy-Item "dist/archgate-upgrade-test.exe" "$binDir\archgate.exe" -Force

          # Verify it reports the fake old version
          $before = & "$binDir\archgate.exe" --version 2>&1
          Write-Host "Before upgrade: $before"
          if ($before -ne "0.0.1") {
            Write-Error "Expected version 0.0.1, got $before"
            exit 1
          }

          # Run upgrade — should download latest from GitHub Releases and self-replace
          & "$binDir\archgate.exe" upgrade 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Upgrade failed with exit code $LASTEXITCODE"
            exit 1
          }

          # Verify the binary was replaced with the latest version
          $after = & "$binDir\archgate.exe" --version 2>&1
          Write-Host "After upgrade: $after"
          if ($after -eq "0.0.1") {
            Write-Error "Binary was not replaced — still reports 0.0.1"
            exit 1
          }
          Write-Host "Upgrade smoke test passed: $before -> $after"
