name: Publish Shims

# No `release: published` trigger — release-binaries.yml dispatches this via
# `gh workflow run` once binaries are actually uploaded. Avoids racing a
# fixed-budget wait against a build that may need a retry (see CLAUDE.md).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish shims for (e.g. v0.39.0)"
        required: true

permissions: {}

env:
  ARCHGATE_TELEMETRY: "0"

jobs:
  # Sanity-check assets are present (covers GitHub API read-after-write lag).
  wait-for-binaries:
    name: Wait for binaries
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Verify release assets are present
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          REQUIRED_ASSETS=("archgate-darwin-arm64.tar.gz" "archgate-linux-x64.tar.gz" "archgate-win32-x64.zip")
          for i in $(seq 1 10); do
            ASSETS=$(gh release view "$TAG" --repo archgate/cli --json assets --jq '.assets[].name')
            ALL_FOUND=true
            for asset in "${REQUIRED_ASSETS[@]}"; do
              if ! echo "$ASSETS" | grep -qF "$asset"; then
                ALL_FOUND=false
                break
              fi
            done
            if $ALL_FOUND; then
              echo "All required release assets found"
              exit 0
            fi
            echo "Waiting for release assets... attempt $i/10"
            sleep 15
          done
          echo "::error::Required binaries for $TAG are still missing after 10 checks (~2.5 min)."
          echo "::error::This workflow expects release-binaries.yml to have already succeeded for this tag."
          echo "::error::Check the Release Binaries run for $TAG, then re-run: gh workflow run publish-shims.yml -f tag=$TAG"
          exit 1

  publish-pypi:
    needs: wait-for-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write # PyPI trusted publishers (OIDC)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Build package
        working-directory: shims/pypi
        # `uv build` provisions an isolated, version-pinned build environment
        # itself — no unpinned `pip install build` (Scorecard Pinned-Dependencies).
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: shims/pypi/dist/

  publish-nuget:
    needs: wait-for-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write # NuGet trusted publishers (OIDC)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "8.0.x"
      - name: NuGet login (OIDC)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: nuget-login
        with:
          user: rhuan.barreto
      - name: Pack and publish
        working-directory: shims/nuget/Archgate.Tool
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          dotnet pack -c Release
          dotnet nuget push bin/Release/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY"

  publish-go-tag:
    needs: wait-for-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # contents: write is required to push a tag. See
    # project_release_pipeline_gotchas.md for why there's no "workflows" scope.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag }}
      - name: Create Go module tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          GO_TAG="shims/go/${TAG}"
          git tag "$GO_TAG"
          git push origin "$GO_TAG"

  publish-maven:
    needs: wait-for-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: {}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: "temurin"
          java-version: "11"
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Build and publish
        working-directory: shims/maven
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mvn clean deploy -P release -B --no-transfer-progress

  publish-rubygem:
    needs: wait-for-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write # RubyGems trusted publishers (OIDC)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        with:
          ruby-version: "4.0.5"
          bundler-cache: true
          working-directory: shims/rubygem
      - uses: rubygems/release-gem@052cc82692552de3ef2b81fd670e41d13cba8092 # v1.4.0
        with:
          working-directory: shims/rubygem
