name: Update Package Lock
on:
  pull_request:
    branches:
      - main
    paths:
      - "package.json"
      - ".github/workflows/update-lock.yaml"
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ARCHGATE_TELEMETRY: "0"

jobs:
  update-lock:
    name: Update Package Lock
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.GH_APP_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 1
          ref: ${{ github.head_ref }}
      - uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0
        with:
          auto-install: true
          cache: true
          cache-base: main
      - name: Update locks
        run: bun install --lockfile-only
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "chore: update bun.lock"
          commit_options: "--signoff"
          file_pattern: bun.lock
