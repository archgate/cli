# Suppressions live inline as `# zizmor: ignore[rule]` comments next to the
# offending lines — they travel with the code, unlike the line-number-based
# ignores this file previously held, which silently drifted when workflow
# files changed (the release-binaries.yml:172 entry stopped matching once the
# `uses:` moved to line 173, resurfacing the finding).
#
# Current inline suppressions and their justifications:
# - release-binaries.yml `unpinned-uses`: the SLSA generator MUST be referenced
#   by tag, not SHA — documented exception in CI-001
#   (see .archgate/adrs/CI-001-pin-github-actions-by-hash.md).
# - `artipacked` on checkouts in release.yml, update-lock.yaml,
#   update-llms.yaml, publish-shims.yml: those jobs push via git and need the
#   persisted (scoped) token.
rules: {}
